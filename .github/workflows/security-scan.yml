name: Healthcare Security Scan

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]
  schedule:
    - cron: '0 2 * * 0'

env:
  SEMGREP_RULES: healthcare_rules.yaml
  SCAN_OUTPUT: security_report
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install semgrep python-docx reportlab PyGithub jq
          echo "Dependencies installed"

      - name: Debug: List Files
        run: |
          echo "=== Files in Repository ==="
          find . -type f -name "*.py" | head -20
          echo "=== Rules File ==="
          ls -la healthcare_rules.yaml
          echo "=== Requirements ==="
          ls -la requirements.txt

      - name: Validate Semgrep Rules
        run: |
          echo "Validating rules..."
          semgrep validate healthcare_rules.yaml || {
            echo "WARNING: Rule validation failed, but continuing..."
          }

      - name: Run Security Scan
        id: scan
        continue-on-error: true  # Don't fail the job if scan fails
        run: |
          echo "Running security scan..."
          python scanner.py . --output ${{ env.SCAN_OUTPUT }} --format both

          if [ $? -ne 0 ]; then
            echo "ERROR: Python scanner failed!"
            exit 1
          fi

          # Count findings
          echo "Counting findings..."
          JSON_OUTPUT=$(semgrep scan --config ${{ env.SEMGREP_RULES }} --json . 2>/dev/null || echo '{"results":[]}')
          FINDINGS=$$(echo "$$JSON_OUTPUT" | jq '.results | length' 2>/dev/null || echo "0")
          CRITICAL=$$(echo "$$JSON_OUTPUT" | jq '[.results[] | select(.extra.severity == "ERROR")] | length' 2>/dev/null || echo "0")
          HIGH=$$(echo "$$JSON_OUTPUT" | jq '[.results[] | select(.extra.severity == "HIGH")] | length' 2>/dev/null || echo "0")

          echo "findings=$FINDINGS" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT

          echo "Scan Results - Total: $FINDINGS, Critical: $CRITICAL, High: $HIGH"

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            ${{ env.SCAN_OUTPUT }}.docx
            ${{ env.SCAN_OUTPUT }}.pdf
          retention-days: 30
          if-no-files-found: warn

      - name: Comment on Pull Request
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const findings = parseInt("${{ steps.scan.outputs.findings }}") || 0;
            const critical = parseInt("${{ steps.scan.outputs.critical }}") || 0;
            const high = parseInt("${{ steps.scan.outputs.high }}") || 0;

            let commentBody = "## Healthcare Security Scan Results\n\n";
            commentBody += "| Severity | Count |\n";
            commentBody += "|----------|-------|\n";
            commentBody += `| Critical | ${critical} |\n`;
            commentBody += `| High | ${high} |\n`;
            commentBody += `| Medium | ${Math.max(0, findings - critical - high)} |\n`;
            commentBody += `| Total | ${findings} |\n\n`;

            if (critical > 0) {
              commentBody += "**⚠️ CRITICAL: Vulnerabilities detected.**\n";
            } else if (high > 0) {
              commentBody += "**⚡ HIGH: Significant issues detected.**\n";
            } else {
              commentBody += "**✅ No critical vulnerabilities detected.**\n";
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

      - name: Generate SARIF Report
        if: always()
        run: |
          echo "Generating SARIF..."
          semgrep scan --config ${{ env.SEMGREP_RULES }} --sarif --output results.sarif . || true

          if [ ! -f results.sarif ] || [ ! -s results.sarif ]; then
            echo "Creating empty SARIF..."
            echo '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","version":"2.1.0","runs":[]}' > results.sarif
          fi

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          wait-for-processing: true

      - name: Fail on Critical Issues
        if: steps.scan.outputs.critical > 0
        run: |
          echo "❌ CRITICAL vulnerabilities found! Blocking merge."
          exit 1
