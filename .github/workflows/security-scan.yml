name: Healthcare Security Scan

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]
  schedule:
    # Run weekly scan on Sundays at 2 AM UTC
    - cron: "0 2 * * 0"

env:
  SEMGREP_RULES: healthcare_rules.yaml
  SCAN_OUTPUT: security_report

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install semgrep python-docx reportlab PyGithub
          echo "✅ Dependencies installed"

      - name: Validate Semgrep Rules
        run: |
          semgrep validate --config ${{ env.SEMGREP_RULES }}
          echo "✅ Semgrep rules validated"

      - name: Run Security Scan
        id: scan
        run: |
          echo "🔍 Running security scan..."
          python scanner.py . --output ${{ env.SCAN_OUTPUT }} --format both

          # Count findings from JSON output
          FINDINGS=$(semgrep scan --config ${{ env.SEMGREP_RULES }} --json . | jq '.results | length')
          CRITICAL=$(semgrep scan --config ${{ env.SEMGREP_RULES }} --json . | jq '[.results[] | select(.extra.severity == "ERROR")] | length')
          HIGH=$(semgrep scan --config ${{ env.SEMGREP_RULES }} --json . | jq '[.results[] | select(.extra.severity == "HIGH")] | length')

          echo "findings=$FINDINGS" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT

          echo "📊 Scan Results:"
          echo "   Total: $FINDINGS"
          echo "   Critical: $CRITICAL"
          echo "   High: $HIGH"

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            ${{ env.SCAN_OUTPUT }}.docx
            ${{ env.SCAN_OUTPUT }}.pdf
          retention-days: 30
          if-no-files-found: warn

      - name: Comment on Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const findings = parseInt("${{ steps.scan.outputs.findings }}");
            const critical = parseInt("${{ steps.scan.outputs.critical }}");
            const high = parseInt("${{ steps.scan.outputs.high }}");

            let commentBody = "## 🔒 Healthcare Security Scan Results\n\n";
            commentBody += "| Severity | Count |\n";
            commentBody += "|----------|-------|\n";
            commentBody += `| 🔴 Critical | ${critical} |\n`;
            commentBody += `| 🟠 High | ${high} |\n`;
            commentBody += `| 🟡 Medium | ${findings - critical - high} |\n`;
            commentBody += `| 🟢 Total | ${findings} |\n\n`;

            if (critical > 0) {
              commentBody += "⚠️ **CRITICAL: This PR contains vulnerabilities that pose direct risk to patient data.**\n\n";
              commentBody += "These issues must be resolved before merge.\n\n";
            } else if (high > 0) {
              commentBody += "⚡ **HIGH: Significant vulnerabilities detected.**\n\n";
              commentBody += "Remediation strongly recommended before production deployment.\n\n";
            } else {
              commentBody += "✅ **No critical vulnerabilities detected.**\n\n";
            }

            commentBody += "📄 **Full reports available as workflow artifacts.**\n";
            commentBody += "Download from the 'Artifacts' section below.\n";

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });

      - name: Fail on Critical Issues
        if: steps.scan.outputs.critical > 0
        run: |
          echo "❌ CRITICAL vulnerabilities found! Blocking merge."
          echo "Please resolve these issues before merging."
          exit 1

      - name: Generate SARIF for GitHub Security Tab
        if: always()
        run: |
          # Convert Semgrep output to SARIF format for GitHub Security tab
          semgrep scan --config ${{ env.SEMGREP_RULES }} --sarif --output results.sarif . || true

          if [ -f results.sarif ]; then
            echo "✅ SARIF report generated"
          fi

      - name: Upload SARIF to GitHub Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          wait-for-processing: true

  notify-on-failure:
    needs: security-scan
    if: failure() && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Send Notification
        run: |
          echo "⚠️ Security scan failed! Check the workflow logs for details."
          # Add Slack/Teams/email notification here if needed
