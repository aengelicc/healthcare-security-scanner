name: Healthcare Security Scan

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

env:
  SEMGREP_RULES: healthcare_rules.yaml
  SCAN_OUTPUT: security_report

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install semgrep python-docx reportlab PyGithub jq

      - name: List Files
        run: |
          echo "Files in repository:"
          ls -la

      - name: Run Security Scan
        id: scan
        run: |
          python scanner.py . --output security_report --format both
          echo "Scan completed"

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            security_report.docx
            security_report.pdf
          retention-days: 30

      - name: Generate SARIF
        run: |
          semgrep scan --config healthcare_rules.yaml --sarif --output results.sarif . || true
          if [ ! -f results.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > results.sarif
          fi

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
