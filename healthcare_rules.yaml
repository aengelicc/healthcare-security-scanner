    languages: [javascript, typescript]
    severity: ERROR
    message: "Hardcoded credential in JS/TS. Use process.env."
    metadata:
      category: security
      cwe: CWE-798
      impact: "Critical: Unauthorized access"
      hipaa_reference: "§164.312(d)"
      remediation_priority: "Immediate"
      max_remediation_days: 7

  # JS: Unencrypted HTTP
  - id: js-unencrypted-http
    pattern-regex: 'fetch\(["\x27]http://[^"\x27]+["\x27]'
    languages: [javascript, typescript]
    severity: ERROR
    message: "Unencrypted HTTP request in JS. Use HTTPS."
    metadata:
      category: security
      cwe: CWE-319
      impact: "High: PHI Interception"
      hipaa_reference: "§164.312(e)(1)"
      remediation_priority: "Immediate"
      max_remediation_days: 7

